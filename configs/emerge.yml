---
project_name: PROJECT_NAME
loglevel: info
analyses:
  - analysis_name: python and javascript structure
    source_directory: /tmp/emerge
    only_permit_languages:
      - py
      - javascript
    only_permit_file_extensions:
      - .py
      - .js
    ignore_directories_containing:
      - .git
      - .github
      - .pytest_cache
      - .ruff_cache
      - .mypy_cache
      - .venv
      - __pycache__
      - images
      - artifacts
      - outputs
      - data
      - models
      - node_modules
      - dist
      - build
      - target
      - coverage
      - htmlcov
      - tmp
      - temp
    ignore_files_containing:
      - package-lock.json
      - Cargo.lock
      - __init__.py
    file_scan:
      - number_of_methods
      - source_lines_of_code
      - dependency_graph
      - louvain_modularity
      - fan_in_out
      - tfidf
    export:
      - directory: /tmp/emerge/images/emerge
      - graphml
      - json
      - tabular_file
      - tabular_console_overall
      - d3
